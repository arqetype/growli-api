volumes:
  postgres:

services:
  postgres:
    container_name: growli_postgres
    image: 'postgres:latest'
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    volumes:
      - postgres:/data/postgres
    ports:
      - ${POSTGRES_PORT}:5432
    restart: unless-stopped